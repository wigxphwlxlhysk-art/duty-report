<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMC-AI SERVER - ระบบรายงานส่งเวร</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="cyber-grid"></div>

<div class="container">
    <header>
        <div class="ai-badge">SMC-AI SYSTEM CORE</div>
        <h1>🧹 ระบบรายงานส่งเวร SMC-AI</h1>
        <p>ระดับชั้นมัธยมศึกษาปีที่ 4/2</p>
    </header>

    <section class="duty-section hover-bounce">
        <h2>📅 เช็คชื่อผู้ปฏิบัติหน้าที่วันนี้ [SMC-AI]</h2>
        <div class="table-wrapper">
            <table class="duty-table">
                <thead>
                    <tr>
                        <th>ชื่อ-นามสกุล</th>
                        <th style="text-align:center;">สถานะ (มา / ลา / ขาด)</th>
                    </tr>
                </thead>
                <tbody id="duty-list">
                </tbody>
            </table>
        </div>
    </section>

    <section class="form-section hover-bounce">
        <h2>📤 ส่งหลักฐานและรายงานระบบ SMC-AI</h2>
        <div class="input-group">
            <label for="photoInput">📸 แนบรูปถ่ายหลักฐาน</label>
            <input type="file" id="photoInput" accept="image/*" multiple>
        </div>
        
        <div class="input-group">
            <label for="senderName">👤 ชื่อผู้ส่งรายงาน</label>
            <input type="text" id="senderName" placeholder="ระบุชื่อของคุณ">
        </div>
        
        <button class="btn-submit" onclick="sendReport()">🚀 ส่งรายงานเข้ากลุ่ม Telegram</button>
        <div id="status"></div>
    </section>
</div>

<div id="custom-popup" class="popup-overlay">
    <div class="popup-box">
        <div class="popup-icon" style="color: #00b894;">✅</div>
        <h2>SMC-AI SYSTEM</h2>
        <p class="popup-message">This case is closed</p>
    </div>
</div>

<script src="Java.js"></script> 
</body>
</html>

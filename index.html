<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบรายงานส่งเวร - ม.4/2</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>🧹 ระบบรายงานส่งเวร</h1>
        <p>ระดับชั้นมัธยมศึกษาปีที่ 4/2</p>
    </header>

    <section class="duty-section">
        <h2>📅 เช็คชื่อผู้ปฏิบัติหน้าที่วันนี้</h2>
        <div class="table-wrapper">
            <table class="duty-table">
                <thead>
                    <tr>
                        <th>ชื่อ-นามสกุล</th>
                        <th style="text-align:center;">สถานะ (มา / ลา / ขาด)</th>
                    </tr>
                </thead>
                <tbody id="duty-list">
                    <!-- รายชื่อจะแสดงที่นี่ -->
                </tbody>
            </table>
        </div>
    </section>

    <section class="form-section">
        <h2>📤 ส่งหลักฐานและรายงาน</h2>
        <div class="input-group">
            <label for="photoInput">📸 แนบรูปถ่ายหลักฐาน</label>
            <input type="file" id="photoInput" accept="image/*" multiple>
        </div>
        
        <div class="input-group">
            <label for="senderName">👤 ชื่อผู้ส่งรายงาน</label>
            <input type="text" id="senderName" placeholder="ระบุชื่อของคุณ">
        </div>
        
        <button class="btn-submit" onclick="sendReport()">🚀 ส่งรายงานเข้ากลุ่ม Telegram</button>
        <div id="status"></div>
    </section>
</div>

<script src="Java.js"></script> 
</body>
</html>
